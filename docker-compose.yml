services:
  mysql:
    image: mariadb:10.11.16-jammy
    container_name: nanotechsoft-mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${NS_DB_PASSWORD:-Luis@2024}
      MARIADB_DATABASE: ${NS_DB_NAME:-notechsoft}
    ports:
      - "${NOTECHSOFT_MYSQL_PORT:-3307}:3306"
    volumes:
      - notechsoft_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p\"$${MARIADB_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  pacs-postgres:
    image: postgres:16-alpine
    container_name: nanotechsoft-pacs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${RAIOXPACS_PGUSER:-postgres}
      POSTGRES_PASSWORD: ${RAIOXPACS_PGPASSWORD:-postgres}
      POSTGRES_DB: ${RAIOXPACS_PGDATABASE:-raioxpacs}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${RAIOXPACS_POSTGRES_PORT:-5433}:5432"
    volumes:
      - notechsoft_pacs_postgres:/var/lib/postgresql/data
      - ./apps/pacs/source/docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    container_name: nanotechsoft-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      pacs-postgres:
        condition: service_healthy
    environment:
      FLASK_SECRET: ${FLASK_SECRET:-notechsoft-dev-secret}
      NS_DB_HOST: mysql
      NS_DB_PORT: 3306
      NS_DB_USER: ${NS_DB_USER:-root}
      NS_DB_PASSWORD: ${NS_DB_PASSWORD:-Luis@2024}
      NS_DB_NAME: ${NS_DB_NAME:-notechsoft}
      NS_HOST: 0.0.0.0
      NS_PORT: 5600
      NS_DEBUG: ${NS_DEBUG:-0}
      AUTOMACAO_APP_DIR: ${AUTOMACAO_APP_DIR:-/app/apps/automacao/source}
      NANOPONTO_APP_DIR: ${NANOPONTO_APP_DIR:-/app/apps/nanoponto/source}
      ZAP_APP_DIR: ${ZAP_APP_DIR:-/app/apps/zap/source}
      NANOSTORE_APP_DIR: ${NANOSTORE_APP_DIR:-/app/apps/nanostore/source}
      GPSMUSICAL_APP_DIR: ${GPSMUSICAL_APP_DIR:-/app/apps/gpsmusical/source}
      BPA_APP_DIR: ${BPA_APP_DIR:-/app/apps/bpa/source}
      TATOO_APP_DIR: ${TATOO_APP_DIR:-/app/apps/tatoo/source}
      RAIOXPACS_APP_DIR: ${RAIOXPACS_APP_DIR:-/app/apps/pacs/source}
      RAIOXPACS_PGHOST: ${RAIOXPACS_PGHOST:-pacs-postgres}
      RAIOXPACS_PGPORT: ${RAIOXPACS_PGPORT:-5432}
      RAIOXPACS_PGUSER: ${RAIOXPACS_PGUSER:-postgres}
      RAIOXPACS_PGPASSWORD: ${RAIOXPACS_PGPASSWORD:-postgres}
      RAIOXPACS_PGDATABASE: ${RAIOXPACS_PGDATABASE:-raioxpacs}
      RAIOXPACS_PGSSLMODE: ${RAIOXPACS_PGSSLMODE:-prefer}
      RAIOXPACS_AUTO_BOOTSTRAP_SCHEMA: ${RAIOXPACS_AUTO_BOOTSTRAP_SCHEMA:-1}
      NANOTECH_SHARED_DIR: ${NANOTECH_SHARED_DIR:-/app/apps/shared}
      RIOB_BASE_URL: ${RIOB_BASE_URL:-http://127.0.0.1:8898}
      RIOB_SSL_VERIFY: ${RIOB_SSL_VERIFY:-0}
    ports:
      - "${NOTECHSOFT_APP_PORT:-5600}:5600"
    volumes:
      - ./apps:/app/apps
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://127.0.0.1:5600/login >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  notechsoft_mysql:
  notechsoft_pacs_postgres:
