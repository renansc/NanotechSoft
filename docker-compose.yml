services:
  mysql:
    image: mariadb:10.11.16-jammy
    container_name: nanotechsoft-mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${NS_DB_PASSWORD:-Luis@2024}
      MARIADB_DATABASE: ${NS_DB_NAME:-notechsoft}
    ports:
      - "${NOTECHSOFT_MYSQL_PORT:-3307}:3306"
    volumes:
      - notechsoft_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p\"$${MARIADB_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FLASK_SECRET: ${FLASK_SECRET:-notechsoft-dev-secret}
      NS_DB_HOST: mysql
      NS_DB_PORT: 3306
      NS_DB_USER: ${NS_DB_USER:-root}
      NS_DB_PASSWORD: ${NS_DB_PASSWORD:-Luis@2024}
      NS_DB_NAME: ${NS_DB_NAME:-notechsoft}
      NS_HOST: 0.0.0.0
      NS_PORT: 5600
      NS_DEBUG: ${NS_DEBUG:-0}
      AUTOMACAO_APP_DIR: ${AUTOMACAO_APP_DIR:-/srv/sensoresMonitor/monitoramento-industrial-v5.0}
      NANOPONTO_APP_DIR: ${NANOPONTO_APP_DIR:-/srv/rede/nanotech/NanoPonto}
      ZAP_APP_DIR: ${ZAP_APP_DIR:-/srv/rede/nanotech/zap}
      NANOSTORE_APP_DIR: ${NANOSTORE_APP_DIR:-/srv/rede/nanotech/NanoStore}
      GPSMUSICAL_APP_DIR: ${GPSMUSICAL_APP_DIR:-/srv/rede/nanotech/gpsmusical}
      BPA_APP_DIR: ${BPA_APP_DIR:-/srv/rede/nanotech/bpa}
      TATOO_APP_DIR: ${TATOO_APP_DIR:-/srv/rede/nanotech/tatoo}
      NANOTECH_SHARED_DIR: ${NANOTECH_SHARED_DIR:-/srv/rede/nanotech/shared}
      RIOB_BASE_URL: ${RIOB_BASE_URL:-http://host.docker.internal}
      RIOB_SSL_VERIFY: ${RIOB_SSL_VERIFY:-0}
    ports:
      - "${NOTECHSOFT_APP_PORT:-5600}:5600"
    volumes:
      - ./apps:/app/apps
      - /srv/rede:/srv/rede
      - /srv/sensoresMonitor:/srv/sensoresMonitor
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://127.0.0.1:5600/login >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  notechsoft_mysql:
