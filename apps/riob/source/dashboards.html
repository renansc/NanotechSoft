<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TV Dashboards - RioBranco (Sem Menu)</title>
  <style>
    html, body { height: 100%; margin: 0; background: #000; }
    #frame { width: 100vw; height: 100vh; border: 0; display: block; background: #000; }

    #badge{
      position: fixed; left: 12px; top: 10px; z-index: 9999;
      font: 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: #fff; background: rgba(0,0,0,.55); padding: 6px 10px; border-radius: 10px;
      backdrop-filter: blur(6px);
      user-select: none;
    }
    #badgeToggle{
      position: fixed; right: 12px; top: 10px; z-index: 9999;
      font: 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: #fff; background: rgba(0,0,0,.55); padding: 6px 10px; border-radius: 10px;
      backdrop-filter: blur(6px);
      user-select: none;
      cursor: pointer;
    }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <div id="badge">Carregando…</div>
  <div id="badgeToggle" title="Ocultar/mostrar indicador">i</div>
  <iframe id="frame" src="RioBranco.html?no_login=1"></iframe>

  <script>
    // Troca a cada 15s
    const ROTATE_EVERY_MS = 15000;

    // Esconder menu/header dentro do iframe
    const HIDE_SELECTORS = [
      "header", ".topo", ".topbar", ".navbar",
      ".menu", ".sidebar", ".side-menu",
      ".menu-toggle", ".hamburger",
      "#menu", "#sidebar", "#nav",
      ".menu-overlay"
    ];
    const EXPAND_CONTENT_SELECTORS = [
      "body", "main", "#app", ".app", ".content", ".page", ".container", ".main-content"
    ];

    // ✅ NO SEU RioBranco.html NÃO EXISTE sec-dashboard/sec-dashboard-frota.
    // Existe a seção única: <section id="dashboard"> e as duas VIEWS:
    //   - <div id="dashViewResumo" ...>
    //   - <div id="dashViewFrota" ...>
    // E quem alterna é openDashboardView(..., 'resumo'|'frota') no script.js.
    const DASHBOARDS = [
      { label: "Dashboard 1 (Resumo)", view: "resumo" },
      { label: "Dashboard 2 (Frota / Manutenção)", view: "frota" }
    ];

    const iframe = document.getElementById("frame");
    const badge  = document.getElementById("badge");
    const badgeToggle = document.getElementById("badgeToggle");

    let idx = 0;
    let badgeVisible = true;

    badgeToggle.addEventListener("click", () => {
      badgeVisible = !badgeVisible;
      badge.classList.toggle("hidden", !badgeVisible);
    });

    function setBadge(text){ badge.textContent = text; }

    function injectCssToHideMenu(){
      const cd = iframe.contentDocument;
      if (!cd) return;
      if (cd.getElementById("tv-hide-menu-style")) return;

      const style = cd.createElement("style");
      style.id = "tv-hide-menu-style";

      const hide = HIDE_SELECTORS.map(s => `${s}{display:none !important;}`).join("\n");
      const expand = EXPAND_CONTENT_SELECTORS.map(s => `${s}{margin-top:0 !important; padding-top:0 !important;}`).join("\n");

      // Faz a área do dashboard ocupar tudo
      style.textContent = `
        html,body{overflow:hidden !important; height:100% !important;}
        ${hide}
        ${expand}
        /* garante que a seção dashboard ocupe toda a tela */
        #dashboard{display:block !important; padding: 12px !important;}
      `;
      cd.head.appendChild(style);
    }

    function switchToView(view){
      const cw = iframe.contentWindow;
      const cd = iframe.contentDocument;
      if (!cw || !cd) return false;

      // sempre esconder menu
      try { injectCssToHideMenu(); } catch(e){}

      // garante que a seção #dashboard esteja ativa (alguma navegação anterior pode ter mudado)
      try{
        if (typeof cw.showTab === "function"){
          const dashMenu = cd.querySelector('.menu-item.has-submenu[data-tab="dashboard"]');
          cw.showTab("dashboard", dashMenu || null);
        }
      }catch(e){}

      // alterna view do dashboard usando a função real do seu app
      try{
        if (typeof cw.openDashboardView === "function"){
          cw.openDashboardView(null, view); // 'resumo' ou 'frota'
          return true;
        }
      }catch(e){}

      // fallback: chama setDashboardView se existir
      try{
        if (typeof cw.setDashboardView === "function"){
          cw.setDashboardView(view);
          return true;
        }
      }catch(e){}

      // fallback DOM: mostra/oculta divs do dashboard
      try{
        const vResumo = cd.getElementById("dashViewResumo");
        const vFrota  = cd.getElementById("dashViewFrota");
        if (vResumo && vFrota){
          vResumo.classList.toggle("hidden", view === "frota");
          vFrota.classList.toggle("hidden", view !== "frota");
          // dispara render do dash frota (caso o JS não tenha sido chamado)
          if (view === "frota" && typeof cw.renderDashboardFrota === "function"){
            cw.renderDashboardFrota();
          }
          return true;
        }
      }catch(e){}

      return false;
    }

    function goTo(i){
      idx = (i + DASHBOARDS.length) % DASHBOARDS.length;
      const d = DASHBOARDS[idx];
      setBadge(`Exibindo: ${d.label}`);

      const cd = iframe.contentDocument;
      if (!iframe.contentWindow || !cd || cd.readyState !== "complete"){
        // carrega “limpo” (evita cache/estado) e depois alterna
        iframe.src = "RioBranco.html?tv=1&_=" + Date.now();
        iframe.onload = () => {
          try { injectCssToHideMenu(); } catch(e){}
          switchToView(d.view);
          iframe.onload = null;
        };
        return;
      }

      const ok = switchToView(d.view);
      if (!ok){
        // fallback final: recarrega e tenta de novo
        iframe.src = "RioBranco.html?tv=1&_=" + Date.now();
        iframe.onload = () => {
          try { injectCssToHideMenu(); } catch(e){}
          switchToView(d.view);
          iframe.onload = null;
        };
      }
    }

    // Inicial: carrega e define Resumo
    iframe.src = "RioBranco.html?tv=1&_=" + Date.now();
    iframe.onload = () => {
      try { injectCssToHideMenu(); } catch(e){}
      setBadge(`Exibindo: ${DASHBOARDS[0].label}`);
      switchToView(DASHBOARDS[0].view);
      iframe.onload = null;
    };

    // Rotação
    setInterval(() => goTo(idx + 1), ROTATE_EVERY_MS);

    // Atalhos
    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") goTo(idx + 1);
      if (e.key === "ArrowLeft")  goTo(idx - 1);
      if (e.key.toLowerCase() === "i") badgeToggle.click();
    });
  </script>
</body>
</html>
