services:
  db:
    image: mysql:8.4
    container_name: nanostore-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --mysql-native-password=ON
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 20

  cert-bootstrap:
    build: .
    container_name: nanostore-cert-bootstrap
    restart: "no"
    environment:
      ENABLE_HTTPS: ${ENABLE_HTTPS:-1}
      SERVER_NAME: ${SERVER_NAME:-_}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      CA_CERT_CN: ${CA_CERT_CN:-NanoStore Internal CA}
      CA_CERT_DAYS: ${CA_CERT_DAYS:-3650}
      SERVER_CERT_DAYS: ${SERVER_CERT_DAYS:-825}
      CERT_FORCE_REISSUE: ${CERT_FORCE_REISSUE:-0}
      CERT_APP_HOSTS: ${CERT_APP_HOSTS:-}
      CERT_DIR: /certs
    entrypoint: ["python", "/app/deploy/certs/bootstrap_trust.py"]
    volumes:
      - ./certs:/certs

  app:
    build: .
    container_name: nanostore-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      cert-bootstrap:
        condition: service_completed_successfully
    environment:
      SECRET_KEY: ${SECRET_KEY}
      HOST: 0.0.0.0
      PORT: 5000
      FLASK_DEBUG: "false"
      APP_CERT_DIR: /app/certs
      DATABASE_URL: mysql+pymysql://${DB_USER}:${DB_PASSWORD_URL}@db:3306/${DB_NAME}
    expose:
      - "5000"
    volumes:
      - .:/app

  web:
    image: nginx:1.27-alpine
    container_name: nanostore-web
    restart: unless-stopped
    depends_on:
      cert-bootstrap:
        condition: service_completed_successfully
      app:
        condition: service_started
    environment:
      ENABLE_HTTPS: ${ENABLE_HTTPS:-1}
      SERVER_NAME: ${SERVER_NAME:-_}
      HTTPS_PORT: ${HTTPS_PORT:-8443}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/http.conf.template:/etc/nginx/nanostore-http.conf.template:ro
      - ./deploy/nginx/https.conf.template:/etc/nginx/nanostore-https.conf.template:ro
      - ./deploy/nginx/select-config.sh:/docker-entrypoint.d/40-select-config.sh:ro
      - ./certs:/etc/nginx/certs:ro

volumes:
  mysql_data:
