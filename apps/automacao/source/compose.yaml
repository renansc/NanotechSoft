services:
  app:
    build:
      context: .
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      DATABASE_PATH: /app/data/homologacao.db
      DRIVER_MONITOR_ENABLED: "${DRIVER_MONITOR_ENABLED:-1}"
    volumes:
      - sensores_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  simulador:
    build:
      context: .
    command: ["python", "simulador.py"]
    environment:
      SENSOR_API_URL: http://app:5000/api/leitura
      MOTOR_ID: "${MOTOR_ID:-1}"
      SENSOR_INTERVAL: "${SENSOR_INTERVAL:-5}"
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - simulador
    restart: unless-stopped

volumes:
  sensores_data:
