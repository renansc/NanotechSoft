{% extends 'base.html' %}

{% block content %}

<h1>Alarmes</h1>

<div class="card">

<table>

<tr>
<th>Data</th>
<th>Motor</th>
<th>Tipo</th>
<th>Valor</th>
</tr>

{% for item in dados %}

<tr>

<td>{{ item.timestamp }}</td>

<td>{{ item.motor_id }}</td>

<td>{{ item.tipo }}</td>

<td>{{ item.valor }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
